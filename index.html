<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buhurt Formation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15181c;
    --panel:#1c2126;
    --panel-raised:#262c32;
    --hairline:#343b42;
    --ink:#e8e3d3;
    --ink-dim:#909aa2;
    --brass:#b98a3d;
    --brass-dim:#7a5f30;
    --rust:#9c4a35;
    --gold:#e0b23d;
    --font-display:'Spectral', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);font-size:14px;line-height:1.4;}
  h1,h2,h3,.display{font-family:var(--font-display);}
  button{
    font-family:var(--font-body);font-size:13px;font-weight:500;
    background:var(--panel-raised);color:var(--ink);border:1px solid var(--hairline);
    border-radius:3px;padding:6px 12px;cursor:pointer;transition:border-color .15s;
  }
  button:hover{border-color:var(--brass);}
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--brass); outline-offset:1px;
  }
  button.primary{background:var(--brass-dim);border-color:var(--brass);color:var(--ink);}
  button.primary:hover{background:var(--brass);}
  button.danger{border-color:var(--rust);}
  button.danger:hover{background:var(--rust);}
  button.ghost{background:transparent;border-color:transparent;color:var(--ink-dim);}
  button.ghost:hover{color:var(--ink);border-color:var(--hairline);}
  button.toggle.on{background:var(--brass-dim);border-color:var(--brass);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  input,select,textarea{
    font-family:var(--font-body);font-size:13px;background:var(--panel);color:var(--ink);
    border:1px solid var(--hairline);border-radius:3px;padding:5px 8px;
  }
  input:hover,select:hover,textarea:hover{border-color:var(--brass-dim);}
  label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-dim);display:block;margin-bottom:3px;}

  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:1px solid var(--hairline);background:var(--panel);
    position:sticky;top:0;z-index:20;flex-wrap:wrap;gap:10px;
  }
  header.top .brand{display:flex;align-items:baseline;gap:10px;}
  header.top .brand .mark{color:var(--brass);font-size:20px;}
  header.top h1{font-size:19px;margin:0;font-weight:600;letter-spacing:.01em;}
  header.top .sub{color:var(--ink-dim);font-size:12px;font-family:var(--font-mono);}
  .top-actions{display:flex;gap:8px;align-items:center;}

  main{padding:20px 22px 60px;max-width:1400px;margin:0 auto;}

  .card{background:var(--panel);border:1px solid var(--hairline);border-radius:6px;padding:16px;margin-bottom:18px;}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .card h2 .num{color:var(--brass);font-family:var(--font-mono);font-size:12px;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:820px){.grid-2,.grid-3{grid-template-columns:1fr;}}

  .field-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .field-row > div{flex:1;min-width:140px;}
  .field-row textarea{width:100%;min-height:44px;resize:vertical;}
  .hint{color:var(--ink-dim);font-size:11px;margin-top:6px;}

  .team-block{border:1px solid var(--hairline);border-radius:6px;padding:12px;background:var(--panel-raised);}
  .team-block .team-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .team-block .team-head .swatch-row{display:flex;gap:5px;}
  .swatch{width:18px;height:18px;border-radius:3px;border:1px solid var(--hairline);cursor:pointer;padding:0;}
  .swatch.add{background:transparent;color:var(--ink-dim);font-size:11px;display:flex;align-items:center;justify-content:center;}

  .roster{display:flex;flex-direction:column;gap:6px;max-height:230px;overflow-y:auto;}
  .fighter-card{
    display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--hairline);
    border-radius:4px;padding:6px 8px;cursor:pointer;
  }
  .fighter-card:hover{border-color:var(--brass-dim);}
  .fighter-card .type-tag{
    font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);text-transform:uppercase;
    background:var(--panel-raised);padding:2px 5px;border-radius:2px;letter-spacing:.04em;
  }
  .fighter-card .fname{flex:1;font-weight:500;font-size:13px;}
  .fighter-card .belt{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);}
  .fighter-card .weap{font-size:10px;color:var(--brass);}
  .fighter-card .rm{background:none;border:none;color:var(--ink-dim);cursor:pointer;padding:2px 4px;font-size:14px;line-height:1;}
  .fighter-card .rm:hover{color:var(--rust);}
  .add-fighter-form{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .add-fighter-form input{flex:1;min-width:70px;}
  .add-fighter-form select{width:118px;}

  .timeline{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 14px;}
  .snap-chip{
    flex:0 0 auto;min-width:130px;border:1px solid var(--hairline);border-radius:5px;
    background:var(--panel-raised);padding:8px 10px;cursor:pointer;position:relative;
  }
  .snap-chip:hover{border-color:var(--brass-dim);}
  .snap-chip.active{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass) inset;}
  .snap-chip .t{font-family:var(--font-mono);font-size:11px;color:var(--brass);}
  .snap-chip .p{font-size:12px;font-weight:600;margin-top:2px;}
  .snap-chip .n{color:var(--ink-dim);font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
  .add-snap-chip{
    flex:0 0 auto;min-width:44px;border:1px dashed var(--hairline);border-radius:5px;
    background:transparent;color:var(--ink-dim);font-size:20px;cursor:pointer;
  }
  .add-snap-chip:hover{border-color:var(--brass);color:var(--brass);}

  .list-wrap{display:grid;grid-template-columns:1fr 260px;gap:16px;}
  @media(max-width:980px){.list-wrap{grid-template-columns:1fr;}}
  .field-holder{background:var(--panel);border:1px solid var(--hairline);border-radius:6px;padding:10px;}
  .field-holder svg{width:100%;height:auto;display:block;touch-action:none;}
  .bench{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .bench-item{
    font-size:11px;padding:5px 8px;border:1px dashed var(--hairline);border-radius:4px;cursor:pointer;
    background:var(--panel-raised);
  }
  .bench-item:hover{border-color:var(--brass);}
  .bench-item small{color:var(--ink-dim);font-family:var(--font-mono);margin-left:4px;}

  .inspector{background:var(--panel-raised);border:1px solid var(--hairline);border-radius:6px;padding:12px;align-self:start;}
  .inspector h3{font-size:13px;margin:0 0 10px;}
  .inspector .empty{color:var(--ink-dim);font-size:12px;}
  .inspector .row{margin-bottom:10px;}
  .status-toggles{display:flex;gap:6px;}
  .status-toggles button{flex:1;font-size:11px;padding:6px 4px;}

  .empty-state{color:var(--ink-dim);font-size:13px;padding:20px;text-align:center;border:1px dashed var(--hairline);border-radius:6px;}
  .row-inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .file-input{display:none;}
  .marshal-panel{display:flex;align-items:center;gap:8px;margin-top:8px;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:4px;}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="mark">⚔</span>
    <h1>Buhurt Formation Tool</h1>
    <span class="sub" id="matchSub">no match loaded</span>
  </div>
  <div class="top-actions">
    <button class="ghost" id="newMatchBtn">New match</button>
    <button id="importBtn">Import JSON</button>
    <button class="primary" id="exportBtn">Export JSON</button>
    <input type="file" id="fileInput" class="file-input" accept="application/json">
  </div>
</header>

<main id="app"></main>

<script>
/* ---------- constants ---------- */
const STORAGE_KEY = 'buhurt-formation-tool-v3';
const FORMATS = {
  '3v3':   { lengthRange:[7,20],  widthRange:[5,15],   defaultLength:10, defaultWidth:7 },
  '5v5':   { lengthRange:[9,20],  widthRange:[7,15],   defaultLength:12, defaultWidth:9 },
  '12v12': { lengthRange:[15,20], widthRange:[7,15],   defaultLength:17, defaultWidth:10 },
  '30v30': { lengthRange:[25,30], widthRange:[12.5,20],defaultLength:27, defaultWidth:15 }
};
const WEAPONS = [
  { name: 'Sword/Axe/Mace & Shield',   symbol: '◆' },
  { name: 'Sword/Axe/Mace & Buckler',  symbol: '◇' },
  { name: 'Solo Sword/Axe/Mace',       symbol: '●' },
  { name: 'Long Axe',                  symbol: '↑' },
  { name: 'Poleaxe',                   symbol: '╬' },
  { name: 'Longsword',                 symbol: '‖' },
  { name: 'Two-Handed Falchion',       symbol: '≈' },
  { name: 'Other',                     symbol: '?' }
];
const WEAPON_NAMES = WEAPONS.map(w => w.name);
function weaponSymbol(name){ const w = WEAPONS.find(x => x.name === name); return w ? w.symbol : '?'; }
const DOWN_REASONS = ['Fall','Decision','Armour failure'];

let state = null;
let ui = { activeSnapshotId: null, selected: null, dragging: null };
// ui.selected = { team, fighterId } — fighter currently on field, shown in inspector
// ui.dragging = { kind:'fighter'|'marshal', team?, fighterId?, marshalId? }

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

function blankMatch(){
  const fmt = FORMATS['5v5'];
  return {
    id: uid('match'),
    title: 'Untitled Match',
    date: '',
    location: '',
    notes: '',
    format: '5v5',
    list: { length: fmt.defaultLength, width: fmt.defaultWidth },
    teams: [
      { name: 'Team A', colors: ['#9c4a35'] },
      { name: 'Team B', colors: ['#3d6a9c'] }
    ],
    fighters: { teamA: [], teamB: [] },
    marshals: defaultMarshals(fmt.defaultWidth, fmt.defaultLength),
    snapshots: []
  };
}

function defaultMarshals(w,l){
  const m = (x,y)=>({ id: uid('m'), x, y });
  return [
    m(-0.4, l*0.22), m(w+0.4, l*0.22),      // upper sides
    m(-0.4, l*0.78), m(w+0.4, l*0.78),      // lower sides
    m(w*0.35, l/2),  m(w*0.65, l/2)         // centre-line linesmen
  ];
}

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: 3, match: state })); }
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ state = JSON.parse(raw).match; if(state) return; }catch(e){}
  }
  state = blankMatch();
}

/* ---------- helpers ---------- */
function allFighters(team){ return state.fighters[team]; }
function fighterById(team, id){ return allFighters(team).find(f => f.id === id); }
function fighterAnyTeam(id){
  for(const team of ['teamA','teamB']){
    const f = fighterById(team, id);
    if(f) return { fighter:f, team };
  }
  return null;
}
function activeSnapshot(){ return state.snapshots.find(s => s.id === ui.activeSnapshotId); }

function ensureSnapshotShape(s){
  s.positions = s.positions || { teamA:{}, teamB:{} };
  s.positions.teamA = s.positions.teamA || {};
  s.positions.teamB = s.positions.teamB || {};
}

function onFieldEntries(snapshot, team){
  return Object.entries(snapshot.positions[team]).map(([fid,p]) => ({ fighterId: fid, ...p }))
    .filter(e => fighterById(team, e.fighterId));
}
function benchFighters(snapshot, team){
  const placed = new Set(Object.keys(snapshot.positions[team]));
  return allFighters(team).filter(f => !placed.has(f.id));
}

function placeOnField(snapshot, team, fighterId, x, y){
  snapshot.positions[team][fighterId] = { x, y, down:false, downReason:null, disarmed:false, weapon: fighterById(team,fighterId).defaultWeapon || WEAPON_NAMES[0] };
}
function removeFromField(snapshot, team, fighterId){
  delete snapshot.positions[team][fighterId];
  if(ui.selected && ui.selected.fighterId === fighterId) ui.selected = null;
}

/* ---------- render shell ---------- */
function el(html){ const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstElementChild; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function render(){
  document.getElementById('matchSub').textContent = state.title + (state.date ? ' · ' + state.date : '') + ' · ' + state.format;
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderMatchSetup());
  app.appendChild(renderFightersCard());
  app.appendChild(renderTimelineCard());
  const snap = activeSnapshot();
  if(snap){ ensureSnapshotShape(snap); app.appendChild(renderListEditor(snap)); }
  save();
}

/* ---------- match setup ---------- */
function renderMatchSetup(){
  const fmt = FORMATS[state.format];
  const card = el(`<div class="card">
    <h2><span class="num">01</span> Match</h2>
    <div class="field-row">
      <div><label>Title</label><input id="mTitle" value="${escapeAttr(state.title)}"></div>
      <div><label>Date</label><input id="mDate" type="date" value="${escapeAttr(state.date||'')}"></div>
      <div><label>Location</label><input id="mLoc" value="${escapeAttr(state.location||'')}"></div>
    </div>
    <div class="field-row"><div><label>Notes</label><textarea id="mNotes">${escapeHtml(state.notes||'')}</textarea></div></div>

    <div class="grid-3">
      <div>
        <label>Format</label>
        <select id="mFormat">
          ${Object.keys(FORMATS).map(k => `<option value="${k}" ${k===state.format?'selected':''}>${k}</option>`).join('')}
        </select>
        <div class="hint">Length ${fmt.lengthRange[0]}–${fmt.lengthRange[1]} m · Width ${fmt.widthRange[0]}–${fmt.widthRange[1]} m</div>
      </div>
      <div>
        <label>List length (m)</label>
        <input id="mLength" type="number" step="0.5" min="${fmt.lengthRange[0]}" max="${fmt.lengthRange[1]}" value="${state.list.length}">
      </div>
      <div>
        <label>List width (m)</label>
        <input id="mWidth" type="number" step="0.5" min="${fmt.widthRange[0]}" max="${fmt.widthRange[1]}" value="${state.list.width}">
      </div>
    </div>

    <div class="grid-2" id="teamSetup" style="margin-top:14px;"></div>

    <div class="marshal-panel">
      <span style="font-size:12px;color:var(--ink-dim);">Marshals &amp; linesmen: ${state.marshals.length} placed</span>
      <button id="addMarshalBtn">+ Add marshal</button>
      <span class="hint" style="margin:0;">Drag the gold dots on the list below to position them; click one there to remove it.</span>
    </div>
  </div>`);

  card.querySelector('#mTitle').oninput = e => {
    state.title = e.target.value;
    save();
    document.getElementById('matchSub').textContent = state.title + (state.date ? ' · ' + state.date : '') + ' · ' + state.format;
  };
  card.querySelector('#mDate').oninput = e => { state.date = e.target.value; save(); };
  card.querySelector('#mLoc').oninput = e => { state.location = e.target.value; save(); };
  card.querySelector('#mNotes').oninput = e => { state.notes = e.target.value; save(); };
  card.querySelector('#mFormat').onchange = e => {
    state.format = e.target.value;
    const f = FORMATS[state.format];
    state.list.length = f.defaultLength;
    state.list.width = f.defaultWidth;
    render();
  };
  card.querySelector('#mLength').onchange = e => {
    state.list.length = clamp(parseFloat(e.target.value)||fmt.defaultLength, fmt.lengthRange[0], fmt.lengthRange[1]);
    render();
  };
  card.querySelector('#mWidth').onchange = e => {
    state.list.width = clamp(parseFloat(e.target.value)||fmt.defaultWidth, fmt.widthRange[0], fmt.widthRange[1]);
    render();
  };
  card.querySelector('#addMarshalBtn').onclick = () => {
    state.marshals.push({ id: uid('m'), x: state.list.width/2, y: state.list.length/2 });
    render();
  };

  const teamSetup = card.querySelector('#teamSetup');
  ['teamA','teamB'].forEach((key, i) => {
    const team = state.teams[i];
    const block = el(`<div class="team-block">
      <div class="team-head">
        <input class="tname-input" style="flex:1;font-weight:600" value="${escapeAttr(team.name)}">
        <div class="swatch-row"></div>
      </div>
      <div class="hint">Up to 3 colours</div>
    </div>`);
    block.querySelector('.tname-input').oninput = e => {
      team.name = e.target.value;
      save();
      const label = document.getElementById('teamLabel_'+key);
      if(label) label.textContent = team.name;
    };
    const swRow = block.querySelector('.swatch-row');
    team.colors.forEach((c, ci) => {
      const sw = el(`<input type="color" class="swatch" value="${c}">`);
      sw.oninput = e => { team.colors[ci] = e.target.value; save(); refreshField(); };
      const rm = el(`<button class="ghost" style="padding:0 3px;font-size:11px;">×</button>`);
      rm.onclick = () => { team.colors.splice(ci,1); render(); };
      swRow.appendChild(sw); swRow.appendChild(rm);
    });
    if(team.colors.length < 3){
      const addBtn = el(`<button class="swatch add">+</button>`);
      addBtn.onclick = () => { team.colors.push('#b98a3d'); render(); };
      swRow.appendChild(addBtn);
    }
    teamSetup.appendChild(block);
  });
  return card;
}
function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }

/* ---------- fighters ---------- */
function weaponSelectHtml(cls, current){
  const known = WEAPON_NAMES.includes(current) ? current : 'Other';
  return `<select class="${cls}">${WEAPONS.map(w => `<option value="${w.name}" ${w.name===known?'selected':''}>${w.symbol} ${w.name}</option>`).join('')}</select>`;
}

function renderFightersCard(){
  const card = el(`<div class="card"><h2><span class="num">02</span> Fighters</h2><div class="grid-2" id="rosterCols"></div></div>`);
  const cols = card.querySelector('#rosterCols');
  ['teamA','teamB'].forEach((key, i) => {
    const team = state.teams[i];
    const col = el(`<div>
      <div id="teamLabel_${key}" style="font-weight:600;margin-bottom:8px;color:${team.colors[0]||'var(--ink)'}">${escapeHtml(team.name)}</div>
      <div class="roster" data-team="${key}"></div>
      <div class="add-fighter-form" data-team="${key}">
        <input class="new-fname" placeholder="Name">
        <input class="new-belt" placeholder="Belt #" style="width:70px">
        <select class="new-type">
          <option value="grappler">Grappler</option>
          <option value="striker">Striker</option>
          <option value="generalist">Generalist</option>
          <option value="runner">Runner</option>
          <option value="other">Other</option>
        </select>
        ${weaponSelectHtml('new-weapon','Longsword')}
        <button class="primary add-fighter-btn">Add</button>
      </div>
    </div>`);
    const rosterDiv = col.querySelector('.roster');
    allFighters(key).forEach(f => rosterDiv.appendChild(fighterRow(key, f)));
    col.querySelector('.add-fighter-btn').onclick = () => {
      const nameInp = col.querySelector('.new-fname');
      const beltInp = col.querySelector('.new-belt');
      const typeSel = col.querySelector('.new-type');
      const weapSel = col.querySelector('.new-weapon');
      if(!nameInp.value.trim()) return;
      allFighters(key).push({ id: uid('f'), name: nameInp.value.trim(), beltNumber: beltInp.value.trim(), type: typeSel.value, defaultWeapon: weapSel.value, tags: [] });
      nameInp.value=''; beltInp.value='';
      render();
    };
    cols.appendChild(col);
  });
  return card;
}

function fighterRow(team, f){
  const row = el(`<div class="fighter-card">
    <span class="type-tag">${f.type}</span>
    <span class="fname">${escapeHtml(f.name)}</span>
    ${f.beltNumber ? `<span class="belt">#${escapeHtml(f.beltNumber)}</span>` : ''}
    <span class="weap">${escapeHtml(f.defaultWeapon||'Unarmed')}</span>
    <button class="rm" title="Remove fighter">×</button>
  </div>`);
  row.querySelector('.rm').onclick = (e) => {
    e.stopPropagation();
    const idx = allFighters(team).findIndex(x => x.id === f.id);
    if(idx>-1) allFighters(team).splice(idx,1);
    state.snapshots.forEach(s => { ensureSnapshotShape(s); removeFromField(s, team, f.id); });
    render();
  };
  return row;
}

/* ---------- timeline ---------- */
function renderTimelineCard(){
  const card = el(`<div class="card"><h2><span class="num">03</span> Timeline</h2><div class="timeline" id="timelineRow"></div></div>`);
  const row = card.querySelector('#timelineRow');
  state.snapshots.forEach((s, idx) => {
    const chip = el(`<div class="snap-chip ${s.id===ui.activeSnapshotId?'active':''}">
      <div class="t">${s.timestamp !== undefined && s.timestamp !== '' ? escapeHtml(String(s.timestamp)) : '#'+(idx+1)}</div>
      <div class="p">${escapeHtml(s.phase||'(unlabeled)')}</div>
      <div class="n">${escapeHtml(s.notes||'')}</div>
    </div>`);
    chip.onclick = () => { ui.activeSnapshotId = s.id; ui.selected = null; render(); };
    row.appendChild(chip);
  });
  const addChip = el(`<button class="add-snap-chip" title="New snapshot">+</button>`);
  addChip.onclick = () => {
    const prev = activeSnapshot();
    const s = { id: uid('snap'), timestamp:'', phase:'', notes:'', positions:{teamA:{},teamB:{}} };
    if(prev){ ensureSnapshotShape(prev); s.positions = JSON.parse(JSON.stringify(prev.positions)); }
    state.snapshots.push(s);
    ui.activeSnapshotId = s.id; ui.selected = null;
    render();
  };
  row.appendChild(addChip);
  if(state.snapshots.length === 0){
    row.appendChild(el(`<div class="hint" style="padding:8px;">No snapshots yet — click + to add the first one. New snapshots start as a copy of the previous one.</div>`));
  }
  return card;
}

/* ---------- list (field) editor ---------- */
let svgRef = null;

function renderListEditor(snapshot){
  const card = el(`<div class="card">
    <h2><span class="num">04</span> The list</h2>
    <div class="field-row">
      <div><label>Timestamp</label><input id="sTime" value="${escapeAttr(snapshot.timestamp||'')}" placeholder="e.g. 00:32 or round-1"></div>
      <div><label>Phase</label><input id="sPhase" value="${escapeAttr(snapshot.phase||'')}" placeholder="e.g. engagement, regroup"></div>
      <div class="row-inline" style="align-items:flex-end;">
        <button id="dupSnapBtn">Duplicate</button>
        <button class="danger" id="delSnapBtn">Delete</button>
      </div>
    </div>
    <div class="field-row"><div><label>Notes</label><textarea id="sNotes">${escapeHtml(snapshot.notes||'')}</textarea></div></div>

    <div class="list-wrap">
      <div>
        <div class="field-holder" id="fieldHolder"></div>
        <div id="benchArea"></div>
      </div>
      <div class="inspector" id="inspectorArea"></div>
    </div>
    <div class="hint">Click an empty bench name to place that fighter on the list. Drag fighters or marshals to reposition. Click a placed fighter to select it and edit weapon, down, or disarmed status. Click a marshal on the field to remove it.</div>
  </div>`);

  card.querySelector('#sTime').oninput = e => { snapshot.timestamp = e.target.value; save(); refreshTimeline(); };
  card.querySelector('#sPhase').oninput = e => { snapshot.phase = e.target.value; save(); refreshTimeline(); };
  card.querySelector('#sNotes').oninput = e => { snapshot.notes = e.target.value; save(); refreshTimeline(); };
  card.querySelector('#dupSnapBtn').onclick = () => {
    const copy = JSON.parse(JSON.stringify(snapshot));
    copy.id = uid('snap');
    copy.notes = (snapshot.notes ? snapshot.notes + ' ' : '') + '(duplicate)';
    const idx = state.snapshots.findIndex(s => s.id === snapshot.id);
    state.snapshots.splice(idx+1, 0, copy);
    ui.activeSnapshotId = copy.id; ui.selected = null;
    render();
  };
  card.querySelector('#delSnapBtn').onclick = () => {
    const idx = state.snapshots.findIndex(s => s.id === snapshot.id);
    state.snapshots.splice(idx,1);
    ui.activeSnapshotId = state.snapshots.length ? state.snapshots[Math.max(0,idx-1)].id : null;
    ui.selected = null;
    render();
  };

  card.querySelector('#fieldHolder').appendChild(buildFieldSVG(snapshot));
  card.querySelector('#benchArea').appendChild(buildBench(snapshot));
  card.querySelector('#inspectorArea').appendChild(buildInspector(snapshot));
  return card;
}

function refreshTimeline(){
  const row = document.getElementById('timelineRow');
  if(!row) return;
  const card = renderTimelineCard();
  row.parentElement.replaceWith(card);
}
function refreshField(){
  const snap = activeSnapshot();
  const holder = document.getElementById('fieldHolder');
  if(snap && holder){ holder.innerHTML=''; holder.appendChild(buildFieldSVG(snap)); }
}
function refreshInspector(){
  const snap = activeSnapshot();
  const area = document.getElementById('inspectorArea');
  if(snap && area){ area.innerHTML=''; area.appendChild(buildInspector(snap)); }
}
function refreshBench(){
  const snap = activeSnapshot();
  const area = document.getElementById('benchArea');
  if(snap && area){ area.innerHTML=''; area.appendChild(buildBench(snap)); }
}

function buildFieldSVG(snapshot){
  const W = state.list.width, L = state.list.length;
  const pad = 1.2; // meters of margin so marshals sitting outside the box are visible
  const vbW = W + pad*2, vbH = L + pad*2;
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox', `${-pad} ${-pad} ${vbW} ${vbH}`);
  svgRef = svg;

  function line(x1,y1,x2,y2,stroke,dash,w){
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke); l.setAttribute('stroke-width', w||0.05);
    if(dash) l.setAttribute('stroke-dasharray', dash);
    svg.appendChild(l);
    return l;
  }
  // boundary
  const rect = document.createElementNS(NS,'rect');
  rect.setAttribute('x',0); rect.setAttribute('y',0); rect.setAttribute('width',W); rect.setAttribute('height',L);
  rect.setAttribute('fill','#0000'); rect.setAttribute('stroke','var(--ink)'); rect.setAttribute('stroke-width',0.08);
  svg.appendChild(rect);
  // centre line
  line(0, L/2, W, L/2, 'var(--ink-dim)', '0.15,0.1', 0.03);

  // fighters
  const teamAOn = onFieldEntries(snapshot,'teamA');
  const teamBOn = onFieldEntries(snapshot,'teamB');
  const allOn = [...teamAOn.map(e=>({...e,team:'teamA'})), ...teamBOn.map(e=>({...e,team:'teamB'}))];
  allOn.forEach(entry => {
    const team = entry.team;
    const teamMeta = state.teams[team==='teamA'?0:1];
    const f = fighterById(team, entry.fighterId);
    if(!f) return;
    const g = document.createElementNS(NS,'g');
    g.setAttribute('transform', `translate(${entry.x},${entry.y})`);
    g.style.cursor = 'grab';
    g.setAttribute('opacity', entry.down ? 0.55 : 1);
    const isSel = ui.selected && ui.selected.fighterId === entry.fighterId;

    // concentric rings: colour 1 centre, ringed by colour 2, ringed by colour 3
    const cols = teamMeta.colors.length ? teamMeta.colors : ['#888'];
    const ringColor = i => cols[i] !== undefined ? cols[i] : cols[cols.length-1];
    const outerR = 0.46, midR = 0.31, innerR = 0.16;
    [[outerR,2],[midR,1],[innerR,0]].forEach(([r,ci]) => {
      const c = document.createElementNS(NS,'circle');
      c.setAttribute('r', r);
      c.setAttribute('fill', entry.down ? '#5a5f66' : ringColor(ci));
      if(r === outerR){
        c.setAttribute('stroke', isSel ? 'var(--gold)' : '#000000aa');
        c.setAttribute('stroke-width', isSel ? 0.09 : 0.03);
      }
      g.appendChild(c);
    });

    const label = document.createElementNS(NS,'text');
    label.setAttribute('x',0); label.setAttribute('y',0.11);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('font-size','0.3');
    label.setAttribute('font-family','IBM Plex Mono, monospace');
    label.setAttribute('fill','#fff');
    label.setAttribute('font-weight','600');
    label.textContent = (f.name||'?').slice(0,3).toUpperCase() + weaponSymbol(entry.weapon);
    g.appendChild(label);

    if(entry.disarmed){
      const dx = document.createElementNS(NS,'text');
      dx.setAttribute('x',0); dx.setAttribute('y',-0.55);
      dx.setAttribute('text-anchor','middle'); dx.setAttribute('font-size','0.32');
      dx.setAttribute('fill','var(--rust)');
      dx.textContent = '✕';
      g.appendChild(dx);
    }
    if(entry.down){
      const dn = document.createElementNS(NS,'text');
      dn.setAttribute('x',0); dn.setAttribute('y',0.85);
      dn.setAttribute('text-anchor','middle'); dn.setAttribute('font-size','0.24');
      dn.setAttribute('fill','var(--ink-dim)'); dn.setAttribute('font-family','IBM Plex Mono, monospace');
      dn.textContent = 'DOWN' + (entry.downReason ? ' · ' + entry.downReason.toUpperCase() : '');
      g.appendChild(dn);
    }

    g.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      ui.selected = { team, fighterId: entry.fighterId };
      refreshInspector();
      startDrag(svg, e, (pt) => {
        entry.x = clamp(pt.x, 0, W); entry.y = clamp(pt.y, 0, L);
        snapshot.positions[team][entry.fighterId].x = entry.x;
        snapshot.positions[team][entry.fighterId].y = entry.y;
        g.setAttribute('transform', `translate(${entry.x},${entry.y})`);
      }, () => save());
    });
    svg.appendChild(g);
  });

  // marshals
  state.marshals.forEach(m => {
    const g = document.createElementNS(NS,'g');
    g.setAttribute('transform', `translate(${m.x},${m.y})`);
    g.style.cursor = 'grab';
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('r',0.22); c.setAttribute('fill','var(--gold)'); c.setAttribute('stroke','#000000aa'); c.setAttribute('stroke-width',0.025);
    g.appendChild(c);
    let moved = false;
    g.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      moved = false;
      startDrag(svg, e, (pt) => {
        moved = true;
        m.x = clamp(pt.x, -pad+0.2, W+pad-0.2);
        m.y = clamp(pt.y, -pad+0.2, L+pad-0.2);
        g.setAttribute('transform', `translate(${m.x},${m.y})`);
      }, () => {
        save();
        if(!moved){
          state.marshals = state.marshals.filter(x => x.id !== m.id);
          refreshField(); refreshMarshalCount();
        }
      });
    });
    svg.appendChild(g);
  });

  return svg;
}
function refreshMarshalCount(){
  render(); // marshal count text lives in match setup card; simplest to full re-render
}

function startDrag(svg, downEvent, onMove, onEnd){
  const id = downEvent.pointerId;
  function toPoint(e){
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }
  function move(e){ onMove(toPoint(e)); }
  function up(e){
    window.removeEventListener('pointermove', move);
    window.removeEventListener('pointerup', up);
    onEnd && onEnd();
  }
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
}

function buildBench(snapshot){
  const wrap = document.createElement('div');
  ['teamA','teamB'].forEach((team,i) => {
    const bench = benchFighters(snapshot, team);
    if(!bench.length) return;
    const label = document.createElement('div');
    label.className = 'hint'; label.style.marginTop = '8px';
    label.textContent = state.teams[i].name + ' — not on the list:';
    wrap.appendChild(label);
    const row = document.createElement('div');
    row.className = 'bench';
    bench.forEach(f => {
      const chip = document.createElement('button');
      chip.className = 'bench-item';
      chip.innerHTML = `${escapeHtml(f.name)}<small>${f.type}</small>`;
      chip.onclick = () => {
        const x = state.list.width * (team==='teamA' ? 0.3 + Math.random()*0.4 : 0.3 + Math.random()*0.4);
        const y = team==='teamA' ? state.list.length*0.18 : state.list.length*0.82;
        placeOnField(snapshot, team, f.id, x, y);
        refreshField(); refreshBench(); render();
      };
      row.appendChild(chip);
    });
    wrap.appendChild(row);
  });
  if(!wrap.children.length){
    wrap.innerHTML = '<div class="hint">All fighters are placed on the list.</div>';
  }
  return wrap;
}

function buildInspector(snapshot){
  const wrap = document.createElement('div');
  if(!ui.selected){
    wrap.innerHTML = `<h3>Inspector</h3><div class="empty">Click a fighter on the list to edit their weapon and status.</div>`;
    return wrap;
  }
  const { team, fighterId } = ui.selected;
  const entry = snapshot.positions[team][fighterId];
  const f = fighterById(team, fighterId);
  if(!entry || !f){ ui.selected = null; wrap.innerHTML = `<h3>Inspector</h3><div class="empty">Nothing selected.</div>`; return wrap; }
  const teamMeta = state.teams[team==='teamA'?0:1];

  wrap.innerHTML = `
    <h3 style="color:${teamMeta.colors[0]||'inherit'}">${escapeHtml(f.name)}</h3>
    <div class="row">
      <label>Weapon</label>
      ${weaponSelectHtml('weapSel', entry.weapon)}
      <div class="hint">Switch weapons any time — this only affects the current snapshot onward.</div>
    </div>
    <div class="row">
      <label>Status</label>
      <div class="status-toggles">
        <button class="toggle ${entry.down?'on':''}" id="downBtn">${entry.down?'Down ✓':'Mark down'}</button>
        <button class="toggle ${entry.disarmed?'on':''}" id="disarmBtn">${entry.disarmed?'Disarmed ✓':'Mark disarmed'}</button>
      </div>
      ${entry.down ? `
        <div style="margin-top:8px;">
          <label>Reason</label>
          <select id="downReasonSel">
            ${DOWN_REASONS.map(r => `<option value="${r}" ${entry.downReason===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>` : ''}
    </div>
    <div class="row">
      <button class="danger" id="removeBtn" style="width:100%;">Remove from list</button>
    </div>
  `;

  wrap.querySelector('.weapSel').onchange = e => {
    entry.weapon = e.target.value;
    save(); refreshField();
  };
  wrap.querySelector('#downBtn').onclick = () => {
    entry.down = !entry.down;
    entry.downReason = entry.down ? (entry.downReason || DOWN_REASONS[0]) : null;
    save(); refreshField(); refreshInspector();
  };
  wrap.querySelector('#disarmBtn').onclick = () => { entry.disarmed = !entry.disarmed; save(); refreshField(); refreshInspector(); };
  wrap.querySelector('#removeBtn').onclick = () => { removeFromField(snapshot, team, fighterId); refreshField(); refreshInspector(); refreshBench(); };
  const reasonSel = wrap.querySelector('#downReasonSel');
  if(reasonSel) reasonSel.onchange = e => { entry.downReason = e.target.value; save(); refreshField(); };

  return wrap;
}

/* ---------- import / export ---------- */
function doExport(){
  const payload = { version: 3, match: state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'match').replace(/[^a-z0-9\-_]+/gi,'_') + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function doImport(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.match) throw new Error('missing match field');
      let m = parsed.match;
      if(parsed.version === 1) m = migrateV1(m);
      m.teams = m.teams && m.teams.length === 2 ? m.teams : [{name:'Team A',colors:['#9c4a35']},{name:'Team B',colors:['#3d6a9c']}];
      m.teams.forEach(t => { t.colors = (t.colors||[]).slice(0,3); });
      m.fighters = m.fighters || { teamA: [], teamB: [] };
      m.fighters.teamA.forEach(f => f.defaultWeapon = f.defaultWeapon || 'Longsword');
      m.fighters.teamB.forEach(f => f.defaultWeapon = f.defaultWeapon || 'Longsword');
      m.format = FORMATS[m.format] ? m.format : '5v5';
      const fmt = FORMATS[m.format];
      m.list = m.list || { length: fmt.defaultLength, width: fmt.defaultWidth };
      m.marshals = m.marshals && m.marshals.length ? m.marshals : defaultMarshals(m.list.width, m.list.length);
      m.snapshots = m.snapshots || [];
      m.snapshots.forEach(s => { s.id = s.id || uid('snap'); ensureSnapshotShape(s); });
      state = m;
      ui = { activeSnapshotId: state.snapshots.length ? state.snapshots[0].id : null, selected: null };
      render();
    }catch(err){
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}
function migrateV1(oldMatch){
  // best-effort: convert slot-indexed formations into spread-out positions
  const fmt = FORMATS['5v5'];
  const list = { length: fmt.defaultLength, width: fmt.defaultWidth };
  const m = { ...oldMatch, format:'5v5', list, marshals: defaultMarshals(list.width, list.length) };
  m.fighters.teamA.forEach(f => f.defaultWeapon = 'Longsword');
  m.fighters.teamB.forEach(f => f.defaultWeapon = 'Longsword');
  m.snapshots = (oldMatch.snapshots||[]).map(s => {
    const positions = { teamA:{}, teamB:{} };
    ['teamA','teamB'].forEach((team,ti) => {
      const slots = (s.formations && s.formations[team] && s.formations[team].slots) || {};
      const entries = Object.entries(slots);
      const n = entries.length || 1;
      entries.forEach(([slotKey,fighterId], i) => {
        const x = list.width * ((i+1)/(n+1));
        const y = ti===0 ? list.length*0.2 : list.length*0.8;
        positions[team][fighterId] = { x, y, down:false, downReason:null, disarmed:false, weapon:'Longsword' };
      });
    });
    return { id: s.id || uid('snap'), timestamp: s.timestamp||'', phase: s.phase||'', notes: s.notes||'', positions };
  });
  return m;
}

/* ---------- wire up top bar ---------- */
document.getElementById('newMatchBtn').onclick = () => {
  if(!confirm('Start a new match? Export first if you want to keep the current one.')) return;
  state = blankMatch();
  ui = { activeSnapshotId: null, selected: null };
  render();
};
document.getElementById('exportBtn').onclick = doExport;
document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
  if(e.target.files[0]) doImport(e.target.files[0]);
  e.target.value = '';
};

/* ---------- boot ---------- */
load();
if(!ui.activeSnapshotId && state.snapshots.length) ui.activeSnapshotId = state.snapshots[0].id;
render();
</script>
